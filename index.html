<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HayatNedir</title>

<style>
body { margin:0; background:black; overflow:hidden; }
.video-wrap {
  position:absolute; width:100%; height:100%;
  display:flex; justify-content:center; align-items:center;
}
video {
  width:100%; height:100%;
  object-fit:contain; background:black;
}
.flags {
  position:absolute; top:10px; right:10px;
  display:flex; gap:6px; padding:8px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
}
.flag { width:30px; opacity:.5; cursor:pointer; }
.flag.active { opacity:1; outline:2px solid white; }
.play-btn {
  position:absolute; width:80px; height:80px;
  background:rgba(255,255,255,0.2);
  border-radius:50%;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
}
.play-btn::after {
  content:''; position:absolute;
  top:50%; left:50%;
  transform:translate(-40%,-50%);
  border-style:solid;
  border-width:12px 0 12px 20px;
  border-color:transparent transparent transparent white;
}
.play-btn.hidden { display:none; }
</style>
</head>

<body>

<div class="video-wrap">
  <video id="video" src="tur.mp4" playsinline preload="auto"></video>
</div>

<div class="flags" id="flags"></div>
<div id="playBtn" class="play-btn"></div>

<script>
const langs = [
  { code: "tr", file: "tur.mp4", audioFromVideo: true },
  { code: "us", file: "eng.mp3" },
  { code: "fr", file: "fr.mp3" },
  { code: "es", file: "spa.mp3" },
  { code: "ru", file: "rus.mp3" },
  { code: "cn", file: "chi.mp3" },
  { code: "de", file: "ger.mp3" },
  { code: "jp", file: "jap.mp3" },
  { code: "sa", file: "arb.mp3" }
];

const video = document.getElementById("video");
const playBtn = document.getElementById("playBtn");
const flags = document.getElementById("flags");

let audio = null;
let started = false;
let current = 0;

/* FLAGS */
langs.forEach((l, i) => {
  const img = document.createElement("img");
  img.src = `https://flagcdn.com/w40/${l.code}.png`;
  img.className = "flag" + (i === 0 ? " active" : "");
  img.onclick = () => switchLang(i);
  flags.appendChild(img);
});

/* 🔥 FADE (SADECE AUDIO İÇİN) */
function fadeOutAudio(media, duration = 300) {
  return new Promise(resolve => {
    if (!media) return resolve();

    const step = 30;
    const volStep = media.volume / (duration / step);

    const i = setInterval(() => {
      if (media.volume > volStep) {
        media.volume -= volStep;
      } else {
        media.volume = 0;
        media.pause();
        clearInterval(i);
        resolve();
      }
    }, step);
  });
}

function fadeInAudio(media, duration = 300) {
  return new Promise(resolve => {
    media.volume = 0;

    const step = 30;
    const volStep = 1 / (duration / step);

    const i = setInterval(() => {
      if (media.volume < 1 - volStep) {
        media.volume += volStep;
      } else {
        media.volume = 1;
        clearInterval(i);
        resolve();
      }
    }, step);
  });
}

/* 🔥 PLAY */
playBtn.onclick = async () => {
  try {
    video.muted = !langs[current].audioFromVideo;
    await video.play();

    if (!langs[current].audioFromVideo) {
      audio = new Audio(langs[current].file);
      audio.currentTime = video.currentTime;
      await audio.play();
      fadeInAudio(audio);
    }

    started = true;
    playBtn.classList.add("hidden");

  } catch (e) {
    console.error("PLAY ERROR:", e);
  }
};

/* 🔥 SYNC */
video.addEventListener("timeupdate", () => {
  if (!audio) return;
  if (Math.abs(video.currentTime - audio.currentTime) > 0.25) {
    audio.currentTime = video.currentTime;
  }
});

/* 🔥 SWITCH (TAKILMASIZ) */
async function switchLang(i) {
  if (i === current) return;

  const lang = langs[i];

  // 🎯 SADECE AUDIO FADE OUT
  await fadeOutAudio(audio);

  if (lang.audioFromVideo) {
    // 🇹🇷 video sesi
    video.muted = false;

    if (audio) audio.pause();
    audio = null;

  } else {
    // 🌍 mp3
    video.muted = true;

    const newAudio = new Audio(lang.file);
    newAudio.currentTime = video.currentTime;

    if (started) {
      await newAudio.play();
      fadeInAudio(newAudio);
    }

    audio = newAudio;
  }

  document.querySelectorAll(".flag").forEach(f => f.classList.remove("active"));
  flags.children[i].classList.add("active");

  current = i;
}
</script>

</body>
</html>
