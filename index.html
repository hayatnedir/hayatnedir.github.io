<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HayatNedir</title>

<style>
body { margin:0; background:black; overflow:hidden; }
.video-wrap {
  position:absolute; width:100%; height:100%;
  display:flex; justify-content:center; align-items:center;
}
video {
  width:100%; height:100%;
  object-fit:contain; background:black;
}
.flags {
  position:absolute; top:10px; right:10px;
  display:flex; gap:6px; padding:8px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
}
.flag { width:30px; opacity:.5; cursor:pointer; }
.flag.active { opacity:1; outline:2px solid white; }
.play-btn {
  position:absolute; width:80px; height:80px;
  background:rgba(255,255,255,0.2);
  border-radius:50%;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
}
.play-btn::after {
  content:''; position:absolute;
  top:50%; left:50%;
  transform:translate(-40%,-50%);
  border-style:solid;
  border-width:12px 0 12px 20px;
  border-color:transparent transparent transparent white;
}
.play-btn.hidden { display:none; }
</style>
</head>

<body>

<div class="video-wrap">
  <video id="video" src="tur.mp4" playsinline preload="auto"></video>
</div>

<div class="flags" id="flags"></div>
<div id="playBtn" class="play-btn"></div>

<script>
const langs = [
  { code: "tr", file: "tur.mp4", audioFromVideo: true },
  { code: "us", file: "eng.mp3" },
  { code: "fr", file: "fr.mp3" },
  { code: "es", file: "spa.mp3" },
  { code: "ru", file: "rus.mp3" },
  { code: "cn", file: "chi.mp3" },
  { code: "de", file: "ger.mp3" },
  { code: "jp", file: "jap.mp3" },
  { code: "sa", file: "arb.mp3" }
];

const video = document.getElementById("video");
const playBtn = document.getElementById("playBtn");
const flags = document.getElementById("flags");

let current = 0;
let started = false;

/* 🎧 Web Audio setup */
const ctx = new (window.AudioContext || window.webkitAudioContext)();

const videoSource = ctx.createMediaElementSource(video);
const videoGain = ctx.createGain();
videoSource.connect(videoGain).connect(ctx.destination);

let currentAudio = null;
let currentGain = null;

/* FLAGS */
langs.forEach((l, i) => {
  const img = document.createElement("img");
  img.src = `https://flagcdn.com/w40/${l.code}.png`;
  img.className = "flag" + (i === 0 ? " active" : "");
  img.onclick = () => switchLang(i);
  flags.appendChild(img);
});

/* 🔥 CROSSFADE */
function crossfade(oldGain, newGain, duration = 0.4) {
  const now = ctx.currentTime;

  if (oldGain) {
    oldGain.gain.cancelScheduledValues(now);
    oldGain.gain.setValueAtTime(oldGain.gain.value, now);
    oldGain.gain.linearRampToValueAtTime(0, now + duration);
  }

  newGain.gain.setValueAtTime(0, now);
  newGain.gain.linearRampToValueAtTime(1, now + duration);
}

/* 🔥 PLAY */
playBtn.onclick = async () => {
  await ctx.resume();

  await video.play();

  video.muted = true; // sesi WebAudio yönetecek

  // başlangıç TR
  videoGain.gain.value = 1;

  started = true;
  playBtn.classList.add("hidden");
};

/* 🔥 SYNC */
video.addEventListener("timeupdate", () => {
  if (!currentAudio) return;
  if (Math.abs(video.currentTime - currentAudio.currentTime) > 0.2) {
    currentAudio.currentTime = video.currentTime;
  }
});

/* 🔥 SWITCH (GERÇEK CROSSFade) */
async function switchLang(i) {
  if (i === current) return;

  const lang = langs[i];

  let newAudio = null;
  let newGain = ctx.createGain();

  if (lang.audioFromVideo) {
    // 🎯 video sesi aktif
    newGain = videoGain;
  } else {
    // 🎯 yeni mp3
    newAudio = new Audio(lang.file);
    newAudio.currentTime = video.currentTime;

    const source = ctx.createMediaElementSource(newAudio);
    source.connect(newGain).connect(ctx.destination);

    if (started) await newAudio.play();
  }

  // 🔥 crossfade
  crossfade(
    currentGain || videoGain,
    newGain
  );

  // eski audioyu sonra durdur
  setTimeout(() => {
    if (currentAudio) currentAudio.pause();
  }, 500);

  currentAudio = newAudio;
  currentGain = newGain;
  current = i;

  document.querySelectorAll(".flag").forEach(f => f.classList.remove("active"));
  flags.children[i].classList.add("active");
}
</script>

</body>
</html>
