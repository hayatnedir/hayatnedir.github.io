<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Player</title>

<style>
body {
  margin: 0;
  background: #000;
  font-family: sans-serif;
  color: white;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

/* FLAGS (artık overlay değil) */
.flags {
  position: absolute;
  top: 20px;
  right: 20px;

  display: flex;
  gap: 8px;

  background: rgba(255,255,255,0.06);
  padding: 10px;
  border-radius: 12px;
  backdrop-filter: blur(10px);
}

/* FLAG */
.flag {
  width: 34px;
  height: 22px;
  cursor: pointer;
  opacity: 0.6;
  border-radius: 4px;
  transition: 0.2s;
}

.flag:hover {
  opacity: 1;
  transform: scale(1.1);
}

.flag.active {
  opacity: 1;
  outline: 2px solid white;
}

/* VIDEO CONTAINER */
.video-wrapper {
  height: 90vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 🔥 EN KRİTİK FIX */
video {
  height: 100%;
  width: auto;   /* <-- BU zoom problemini çözer */
  max-width: 100%;
  border-radius: 12px;

  opacity: 1;
  transition: opacity 0.4s ease;
}

video.fade-out {
  opacity: 0;
}

/* MOBILE */
@media (max-width: 600px) {
  .flags {
    top: auto;
    bottom: 20px;
    right: 50%;
    transform: translateX(50%);
  }

  .video-wrapper {
    height: 85vh;
  }
}
</style>
</head>

<body>

<div class="flags">
  <img class="flag active" src="https://flagcdn.com/w40/tr.png" onclick="changeVideo('tur.mp4', this)">
  <img class="flag" src="https://flagcdn.com/w40/us.png" onclick="changeVideo('eng.mp4', this)">
  <img class="flag" src="https://flagcdn.com/w40/fr.png" onclick="changeVideo('fr.mp4', this)">
  <img class="flag" src="https://flagcdn.com/w40/es.png" onclick="changeVideo('spa.mp4', this)">
  <img class="flag" src="https://flagcdn.com/w40/ru.png" onclick="changeVideo('rus.mp4', this)">
  <img class="flag" src="https://flagcdn.com/w40/cn.png" onclick="changeVideo('chi.mp4', this)">
  <img class="flag" src="https://flagcdn.com/w40/de.png" onclick="changeVideo('ger.mp4', this)">
  <img class="flag" src="https://flagcdn.com/w40/jp.png" onclick="changeVideo('jap.mp4', this)">
  <img class="flag" src="https://flagcdn.com/w40/sa.png" onclick="changeVideo('arb.mp4', this)">
</div>

<div class="video-wrapper">
  <video id="videoPlayer" controls autoplay>
    <source src="tur.mp4" type="video/mp4">
  </video>
</div>

<script>
let currentVideo = "tur.mp4";
let isSwitching = false;

function changeVideo(file, el) {
  if (file === currentVideo || isSwitching) return;

  const video = document.getElementById("videoPlayer");
  isSwitching = true;

  video.classList.add("fade-out");

  setTimeout(() => {
    video.src = file;
    video.load();

    video.onloadeddata = () => {
      video.play();
      video.classList.remove("fade-out");
      isSwitching = false;
    };
  }, 250);

  document.querySelectorAll(".flag").forEach(f => f.classList.remove("active"));
  el.classList.add("active");

  currentVideo = file;
}
</script>

</body>
</html>
