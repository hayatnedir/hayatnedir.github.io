<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Video Player</title>

<style>
body {
  margin: 0;
  background: #000;
  overflow: hidden;
}

video {
  position: absolute;
  width: 100%;
  height: 100vh;
  object-fit: cover;
  opacity: 0;
  transition: opacity 0.25s ease;
}

video.active {
  opacity: 1;
  z-index: 1;
}

.flags {
  position: absolute;
  top: 10px;
  right: 10px;
  display: flex;
  gap: 6px;
  padding: 8px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
}

.flag {
  width: 30px;
  height: 20px;
  cursor: pointer;
  opacity: 0.5;
}

.flag.active {
  opacity: 1;
  outline: 2px solid white;
}

.play-btn {
  position: absolute;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.play-btn::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-40%, -50%);
  border-style: solid;
  border-width: 12px 0 12px 20px;
  border-color: transparent transparent transparent white;
}

.play-btn.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="flags" id="flags"></div>
<div id="playBtn" class="play-btn"></div>

<script>
const videoList = [
  { file: "tur.mp4", flag: "tr" },
  { file: "eng.mp4", flag: "us" },
  { file: "fr.mp4", flag: "fr" },
  { file: "spa.mp4", flag: "es" },
  { file: "rus.mp4", flag: "ru" },
  { file: "chi.mp4", flag: "cn" },
  { file: "ger.mp4", flag: "de" },
  { file: "jap.mp4", flag: "jp" },
  { file: "arb.mp4", flag: "sa" }
];

const flags = document.getElementById("flags");
const playBtn = document.getElementById("playBtn");

let videos = [];
let current = 0;
let started = false;

/* 🔥 VIDEOLAR OLUŞTUR (PRELOAD READY) */
videoList.forEach((v, i) => {
  const vid = document.createElement("video");
  vid.src = v.file;
  vid.loop = true;
  vid.playsInline = true;
  vid.preload = "auto";

  document.body.appendChild(vid);
  videos.push(vid);

  const img = document.createElement("img");
  img.src = `https://flagcdn.com/w40/${v.flag}.png`;
  img.className = "flag" + (i === 0 ? " active" : "");
  img.onclick = () => switchVideo(i);

  flags.appendChild(img);
});

/* 🔥 PLAY */
playBtn.onclick = async () => {
  started = true;

  for (let v of videos) {
    v.muted = false;
    v.volume = 1;
  }

  await Promise.all(
    videos.map(v =>
      v.play().catch(() => {})
    )
  );

  videos[0].classList.add("active");
  playBtn.classList.add("hidden");
};

/* 🔥 SWITCH (ANLIK) */
function switchVideo(i) {
  if (i === current) return;

  videos[current].classList.remove("active");
  videos[i].classList.add("active");

  document.querySelectorAll(".flag").forEach(f => f.classList.remove("active"));
  flags.children[i].classList.add("active");

  current = i;
}
</script>

</body>
</html>
