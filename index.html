<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Player</title>

<style>
body {
  margin: 0;
  background: #000;
  font-family: sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
  overflow: hidden;
}

/* FLAGS */
.flags {
  position: absolute;
  top: 20px;
  right: 20px;
  display: flex;
  gap: 8px;
  padding: 10px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

.flag {
  width: 34px;
  height: 22px;
  cursor: pointer;
  opacity: 0.6;
  transition: 0.2s;
  border-radius: 4px;
}

.flag:hover { opacity: 1; transform: scale(1.1); }
.flag.active { opacity: 1; outline: 2px solid white; }

/* VIDEO WRAPPER */
.video-wrapper {
  height: 90vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* ✂️ crop */
.video-mask {
  height: 100%;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

video {
  height: 110%; /* kırpma efekti */
  width: auto;
  max-width: 100%;
  border-radius: 12px;
  transition: transform 0.2s ease, opacity 0.3s ease;
  cursor: pointer;
}

/* SLIDE EFFECT */
video.dragging {
  transition: none;
}

/* PLAY BUTTON */
.play-btn {
  position: absolute;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: 0.3s;
}

.play-btn:hover {
  transform: scale(1.1);
}

.play-btn::after {
  content: '';
  border-style: solid;
  border-width: 12px 0 12px 20px;
  border-color: transparent transparent transparent white;
}

.play-btn.hidden {
  opacity: 0;
  pointer-events: none;
}

/* LOADER */
.loader {
  position: absolute;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.1);
  border-top: 3px solid white;
  animation: spin 0.8s linear infinite;
  opacity: 0;
}

.loader.active { opacity: 1; }

@keyframes spin {
  to { transform: rotate(360deg); }
}

@media (max-width: 600px) {
  .flags {
    top: auto;
    bottom: 20px;
    right: 50%;
    transform: translateX(50%);
  }
}
</style>
</head>

<body>

<div class="flags" id="flagsContainer"></div>

<div class="video-wrapper">
  <div class="video-mask">
    <video id="videoPlayer" loop playsinline></video>
  </div>

  <div id="playBtn" class="play-btn"></div>
  <div id="loader" class="loader"></div>
</div>

<script>
const videoList = [
  { file: "tur.mp4", flag: "tr" },
  { file: "eng.mp4", flag: "us" },
  { file: "fr.mp4", flag: "fr" },
  { file: "spa.mp4", flag: "es" },
  { file: "rus.mp4", flag: "ru" },
  { file: "chi.mp4", flag: "cn" },
  { file: "ger.mp4", flag: "de" },
  { file: "jap.mp4", flag: "jp" },
  { file: "arb.mp4", flag: "sa" }
];

let currentIndex = 0;
let isSwitching = false;

const video = document.getElementById("videoPlayer");
const loader = document.getElementById("loader");
const flagsContainer = document.getElementById("flagsContainer");
const playBtn = document.getElementById("playBtn");

/* PRELOAD */
videoList.forEach(v => {
  const vid = document.createElement("video");
  vid.src = v.file;
});

/* FLAGS */
videoList.forEach((v, i) => {
  const img = document.createElement("img");
  img.src = `https://flagcdn.com/w40/${v.flag}.png`;
  img.className = "flag" + (i === 0 ? " active" : "");
  img.onclick = () => switchVideo(i);
  flagsContainer.appendChild(img);
});

/* INIT */
video.src = videoList[0].file;

/* PLAY */
playBtn.onclick = () => {
  video.play();
  playBtn.classList.add("hidden");
};

/* SWITCH */
function switchVideo(index) {
  if (index === currentIndex || isSwitching) return;

  isSwitching = true;
  loader.classList.add("active");

  video.style.opacity = 0;

  setTimeout(() => {
    video.src = videoList[index].file;
    video.load();

    video.onloadeddata = () => {
      video.play();
      video.style.opacity = 1;
      loader.classList.remove("active");
      isSwitching = false;
    };
  }, 200);

  document.querySelectorAll(".flag").forEach(f => f.classList.remove("active"));
  flagsContainer.children[index].classList.add("active");

  currentIndex = index;
}

/* SWIPE + PREVIEW */
let startX = 0;
let currentX = 0;
let dragging = false;

video.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
  dragging = true;
  video.classList.add("dragging");
});

video.addEventListener("touchmove", e => {
  if (!dragging) return;
  currentX = e.touches[0].clientX;
  let diff = currentX - startX;
  video.style.transform = `translateX(${diff}px)`;
});

video.addEventListener("touchend", e => {
  dragging = false;
  video.classList.remove("dragging");

  let diff = currentX - startX;

  if (Math.abs(diff) > 80) {
    if (diff < 0) {
      switchVideo((currentIndex + 1) % videoList.length);
    } else {
      switchVideo((currentIndex - 1 + videoList.length) % videoList.length);
    }
  }

  video.style.transform = "translateX(0)";
});

/* DESKTOP DRAG */
video.addEventListener("mousedown", e => {
  dragging = true;
  startX = e.clientX;
  video.classList.add("dragging");
});

window.addEventListener("mousemove", e => {
  if (!dragging) return;
  let diff = e.clientX - startX;
  video.style.transform = `translateX(${diff}px)`;
});

window.addEventListener("mouseup", e => {
  if (!dragging) return;
  dragging = false;
  video.classList.remove("dragging");

  let diff = e.clientX - startX;

  if (Math.abs(diff) > 80) {
    if (diff < 0) {
      switchVideo((currentIndex + 1) % videoList.length);
    } else {
      switchVideo((currentIndex - 1 + videoList.length) % videoList.length);
    }
  }

  video.style.transform = "translateX(0)";
});
</script>

</body>
</html>
