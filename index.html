<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Player</title>

<style>
body {
  margin: 0;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.flags {
  position: absolute;
  top: 12px;
  right: 12px;
  display: flex;
  gap: 6px;
  padding: 8px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(8px);
}

.flag {
  width: 30px;
  height: 20px;
  cursor: pointer;
  opacity: 0.6;
}

.flag.active {
  opacity: 1;
  outline: 2px solid white;
}

video {
  height: 100vh;
  object-fit: cover;
}

.play-btn {
  position: absolute;
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  display: flex;
  justify-content: center;
  align-items: center;
}

.play-btn::after {
  content: '';
  border-style: solid;
  border-width: 10px 0 10px 18px;
  border-color: transparent transparent transparent white;
}

.play-btn.hidden {
  opacity: 0;
  pointer-events: none;
}
</style>
</head>

<body>

<div class="flags" id="flagsContainer"></div>

<video id="videoPlayer" loop playsinline preload="auto"></video>
<div id="playBtn" class="play-btn"></div>

<script>
const videoList = [
  { file: "tur.mp4", flag: "tr" },
  { file: "eng.mp4", flag: "us" },
  { file: "fr.mp4", flag: "fr" }
];

let currentIndex = 0;
let hasStarted = false;

const video = document.getElementById("videoPlayer");
const flagsContainer = document.getElementById("flagsContainer");
const playBtn = document.getElementById("playBtn");

/* FLAGS */
videoList.forEach((v, i) => {
  const img = document.createElement("img");
  img.src = `https://flagcdn.com/w40/${v.flag}.png`;
  img.className = "flag" + (i === 0 ? " active" : "");
  img.onclick = () => switchVideo(i);
  flagsContainer.appendChild(img);
});

/* INIT */
video.src = videoList[0].file;

/* 🔥 PLAY (FIXED) */
playBtn.onclick = async () => {
  video.muted = false; // sesi aç
  video.volume = 1;

  try {
    await video.play();
  } catch (e) {
    // hazır değilse fallback
    video.addEventListener("canplay", () => video.play(), { once: true });
  }

  playBtn.classList.add("hidden");
  hasStarted = true;
};

/* SWITCH */
function switchVideo(index) {
  if (index === currentIndex) return;

  video.src = videoList[index].file;
  video.load();

  if (hasStarted) {
    video.addEventListener("loadeddata", () => {
      video.play();
    }, { once: true });
  }

  document.querySelectorAll(".flag").forEach(f => f.classList.remove("active"));
  flagsContainer.children[index].classList.add("active");

  currentIndex = index;
}
</script>

</body>
</html>
