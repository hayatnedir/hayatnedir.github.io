<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Language Player</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: radial-gradient(circle at center, #111 0%, #000 100%);
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  color: white;
  overflow: hidden;
}

/* Video */
.video-container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 85%;
  max-width: 1000px;
}

video {
  width: 100%;
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  opacity: 1;
  transition: opacity 0.4s ease;
}

video.fade-out {
  opacity: 0;
}

/* Flags container */
.flags {
  position: absolute;
  top: 20px;
  right: 20px;
  display: flex;
  gap: 10px;
  padding: 10px 14px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.08);
}

/* Flag buttons */
.flag {
  width: 36px;
  height: 24px;
  border-radius: 6px;
  cursor: pointer;
  opacity: 0.6;
  transition: all 0.25s ease;
  border: 1px solid transparent;
}

.flag:hover {
  opacity: 1;
  transform: scale(1.08);
}

.flag.active {
  opacity: 1;
  transform: scale(1.1);
  border: 1px solid rgba(255,255,255,0.6);
  box-shadow: 0 0 10px rgba(255,255,255,0.4);
}

/* Mobile */
@media (max-width: 600px) {
  .flags {
    top: auto;
    bottom: 20px;
    right: 50%;
    transform: translateX(50%);
  }
}
</style>
</head>

<body>

<div class="flags">
  <img class="flag active" src="https://flagcdn.com/w40/tr.png" title="Türkçe" onclick="changeVideo('tur.mp4', this)">
  <img class="flag" src="https://flagcdn.com/w40/us.png" title="English" onclick="changeVideo('eng.mp4', this)">
  <img class="flag" src="https://flagcdn.com/w40/fr.png" title="Français" onclick="changeVideo('fr.mp4', this)">
  <img class="flag" src="https://flagcdn.com/w40/es.png" title="Español" onclick="changeVideo('spa.mp4', this)">
  <img class="flag" src="https://flagcdn.com/w40/ru.png" title="Русский" onclick="changeVideo('rus.mp4', this)">
  <img class="flag" src="https://flagcdn.com/w40/cn.png" title="中文" onclick="changeVideo('chi.mp4', this)">
  <img class="flag" src="https://flagcdn.com/w40/de.png" title="Deutsch" onclick="changeVideo('ger.mp4', this)">
  <img class="flag" src="https://flagcdn.com/w40/jp.png" title="日本語" onclick="changeVideo('jap.mp4', this)">
  <img class="flag" src="https://flagcdn.com/w40/sa.png" title="العربية" onclick="changeVideo('arb.mp4', this)">
</div>

<div class="video-container">
  <video id="videoPlayer" controls autoplay>
    <source src="tur.mp4" type="video/mp4">
  </video>
</div>

<script>
let currentVideo = "tur.mp4";
let isSwitching = false;

function changeVideo(file, element) {
  if (file === currentVideo || isSwitching) return;

  const video = document.getElementById("videoPlayer");
  isSwitching = true;

  // fade out
  video.classList.add("fade-out");

  setTimeout(() => {
    video.src = "videos/" + file;
    video.load();

    video.onloadeddata = () => {
      video.play();
      video.classList.remove("fade-out");
      isSwitching = false;
    };
  }, 300);

  // aktif flag
  document.querySelectorAll(".flag").forEach(f => f.classList.remove("active"));
  element.classList.add("active");

  currentVideo = file;
}
</script>

</body>
</html>
