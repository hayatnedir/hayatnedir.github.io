<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi Audio Player</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

video {
  width: 100%;
  height: 100vh;
  object-fit: cover;
}

.flags {
  position: absolute;
  top: 10px;
  right: 10px;
  display: flex;
  gap: 6px;
  padding: 8px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
}

.flag {
  width: 30px;
  cursor: pointer;
  opacity: 0.5;
}

.flag.active {
  opacity: 1;
  outline: 2px solid white;
}

.play-btn {
  position: absolute;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.play-btn::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-40%, -50%);
  border-style: solid;
  border-width: 12px 0 12px 20px;
  border-color: transparent transparent transparent white;
}

.play-btn.hidden {
  display: none;
}
</style>
</head>

<body>

<video id="video" src="tur.mp4" playsinline preload="auto"></video>

<div class="flags" id="flags"></div>
<div id="playBtn" class="play-btn"></div>

<script>
const langs = [
  { code: "tr", file: "tr.mp3" },
  { code: "us", file: "eng.mp3" },
  { code: "fr", file: "fr.mp3" },
  { code: "es", file: "spa.mp3" },
  { code: "ru", file: "rus.mp3" },
  { code: "cn", file: "chi.mp3" },
  { code: "de", file: "ger.mp3" },
  { code: "jp", file: "jap.mp3" },
  { code: "sa", file: "arb.mp3" }
];

const video = document.getElementById("video");
const playBtn = document.getElementById("playBtn");
const flags = document.getElementById("flags");

let audio = new Audio(langs[0].file);
let current = 0;
let started = false;

/* FLAGS */
langs.forEach((l, i) => {
  const img = document.createElement("img");
  img.src = `https://flagcdn.com/w40/${l.code}.png`;
  img.className = "flag" + (i === 0 ? " active" : "");
  img.onclick = () => switchLang(i);
  flags.appendChild(img);
});

/* 🔥 PLAY */
playBtn.onclick = async () => {
  started = true;

  video.muted = true; // video sesi kapalı (audio ayrı)
  audio.muted = false;

  try {
    await video.play();
    await audio.play();
  } catch (e) {
    console.error(e);
  }

  playBtn.classList.add("hidden");
};

/* 🔥 SYNC */
video.addEventListener("timeupdate", () => {
  if (Math.abs(video.currentTime - audio.currentTime) > 0.3) {
    audio.currentTime = video.currentTime;
  }
});

/* 🔥 LANG SWITCH */
function switchLang(i) {
  if (i === current) return;

  const newAudio = new Audio(langs[i].file);

  newAudio.currentTime = video.currentTime;

  if (started) {
    newAudio.play();
  }

  audio.pause();
  audio = newAudio;

  document.querySelectorAll(".flag").forEach(f => f.classList.remove("active"));
  flags.children[i].classList.add("active");

  current = i;
}
</script>

</body>
</html>
