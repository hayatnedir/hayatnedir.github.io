<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Player</title>

<style>
body {
  margin: 0;
  background: #000;
  font-family: sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

/* FLAGS */
.flags {
  position: absolute;
  top: 20px;
  right: 20px;
  display: flex;
  gap: 8px;
  padding: 10px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

.flag {
  width: 34px;
  height: 22px;
  cursor: pointer;
  opacity: 0.6;
  transition: 0.2s;
  border-radius: 4px;
}

.flag:hover {
  opacity: 1;
  transform: scale(1.1);
}

.flag.active {
  opacity: 1;
  outline: 2px solid white;
}

/* VIDEO */
.video-wrapper {
  height: 90vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

video {
  height: 100%;
  width: auto;
  max-width: 100%;
  border-radius: 12px;
  opacity: 1;
  transition: opacity 0.3s ease;
  cursor: pointer;
}

video.fade-out {
  opacity: 0;
}

/* LOADER */
.loader {
  position: absolute;
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.1);
  border-top: 3px solid white;
  animation: spin 0.8s linear infinite;
  opacity: 0;
  pointer-events: none;
}

.loader.active {
  opacity: 1;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* MOBILE */
@media (max-width: 600px) {
  .flags {
    top: auto;
    bottom: 20px;
    right: 50%;
    transform: translateX(50%);
  }
}
</style>
</head>

<body>

<div class="flags" id="flagsContainer"></div>

<div class="video-wrapper">
  <video id="videoPlayer" loop playsinline></video>
  <div id="loader" class="loader"></div>
</div>

<script>
const videoList = [
  { file: "tur.mp4", flag: "tr" },
  { file: "eng.mp4", flag: "us" },
  { file: "fr.mp4", flag: "fr" },
  { file: "spa.mp4", flag: "es" },
  { file: "rus.mp4", flag: "ru" },
  { file: "chi.mp4", flag: "cn" },
  { file: "ger.mp4", flag: "de" },
  { file: "jap.mp4", flag: "jp" },
  { file: "arb.mp4", flag: "sa" }
];

let currentIndex = 0;
let isSwitching = false;

const video = document.getElementById("videoPlayer");
const loader = document.getElementById("loader");
const flagsContainer = document.getElementById("flagsContainer");

/* FLAGS RENDER */
videoList.forEach((v, i) => {
  const img = document.createElement("img");
  img.src = `https://flagcdn.com/w40/${v.flag}.png`;
  img.className = "flag" + (i === 0 ? " active" : "");
  img.onclick = () => switchVideo(i);
  flagsContainer.appendChild(img);
});

/* İLK VIDEO */
video.src = videoList[0].file;

/* PLAY ON CLICK */
video.addEventListener("click", () => {
  video.play();
});

/* VIDEO SWITCH */
function switchVideo(index) {
  if (index === currentIndex || isSwitching) return;

  isSwitching = true;
  loader.classList.add("active");
  video.classList.add("fade-out");

  setTimeout(() => {
    video.src = videoList[index].file;
    video.load();

    video.onloadeddata = () => {
      video.play();
      video.classList.remove("fade-out");
      loader.classList.remove("active");
      isSwitching = false;
    };
  }, 250);

  document.querySelectorAll(".flag").forEach(f => f.classList.remove("active"));
  flagsContainer.children[index].classList.add("active");

  currentIndex = index;
}

/* SWIPE DETECTION */
let startX = 0;

video.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

video.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;
  let diff = startX - endX;

  if (Math.abs(diff) > 50) {
    if (diff > 0) {
      // sağa swipe → next
      switchVideo((currentIndex + 1) % videoList.length);
    } else {
      // sola swipe → prev
      switchVideo((currentIndex - 1 + videoList.length) % videoList.length);
    }
  }
});

/* DESKTOP DRAG (bonus) */
let mouseDown = false;

video.addEventListener("mousedown", e => {
  mouseDown = true;
  startX = e.clientX;
});

video.addEventListener("mouseup", e => {
  if (!mouseDown) return;
  mouseDown = false;

  let diff = startX - e.clientX;

  if (Math.abs(diff) > 50) {
    if (diff > 0) {
      switchVideo((currentIndex + 1) % videoList.length);
    } else {
      switchVideo((currentIndex - 1 + videoList.length) % videoList.length);
    }
  }
});
</script>

</body>
</html>
