<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Player</title>

<style>
body {
  margin: 0;
  background: #000;
  font-family: sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
  overflow: hidden;
}

.flags {
  position: absolute;
  top: 12px;
  right: 12px;
  display: flex;
  gap: 6px;
  padding: 8px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(8px);
  z-index: 10;
}

.flag {
  width: 30px;
  height: 20px;
  cursor: pointer;
  opacity: 0.6;
  border-radius: 4px;
}

.flag.active {
  opacity: 1;
  outline: 2px solid white;
}

.video-wrapper {
  width: 100%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.video-mask {
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

video {
  height: 100%;
  width: auto;
  max-width: 100%;
  object-fit: cover;
  transform: scale(1.08);
  transition: transform 0.2s ease, opacity 0.25s ease;
}

.play-btn {
  position: absolute;
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
}

.play-btn::after {
  content: '';
  border-style: solid;
  border-width: 10px 0 10px 18px;
  border-color: transparent transparent transparent white;
}

.play-btn.hidden {
  opacity: 0;
  pointer-events: none;
}

.loader {
  position: absolute;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.1);
  border-top: 3px solid white;
  animation: spin 0.8s linear infinite;
  opacity: 0;
}

.loader.active { opacity: 1; }

@keyframes spin {
  to { transform: rotate(360deg); }
}

@media (max-width: 600px) {
  .flags {
    bottom: 15px;
    top: auto;
    right: 50%;
    transform: translateX(50%);
  }

  video {
    transform: scale(1.1);
  }
}
</style>
</head>

<body>

<div class="flags" id="flagsContainer"></div>

<div class="video-wrapper">
  <div class="video-mask">
    <!-- 🔥 muted ekledik (kritik) -->
    <video id="videoPlayer" loop playsinline preload="auto" muted></video>
  </div>

  <div id="playBtn" class="play-btn"></div>
  <div id="loader" class="loader"></div>
</div>

<script>
const videoList = [
  { file: "tur.mp4", flag: "tr" },
  { file: "eng.mp4", flag: "us" },
  { file: "fr.mp4", flag: "fr" },
  { file: "spa.mp4", flag: "es" },
  { file: "rus.mp4", flag: "ru" },
  { file: "chi.mp4", flag: "cn" },
  { file: "ger.mp4", flag: "de" },
  { file: "jap.mp4", flag: "jp" },
  { file: "arb.mp4", flag: "sa" }
];

let currentIndex = 0;
let isSwitching = false;

const video = document.getElementById("videoPlayer");
const loader = document.getElementById("loader");
const flagsContainer = document.getElementById("flagsContainer");
const playBtn = document.getElementById("playBtn");

/* FLAGS */
videoList.forEach((v, i) => {
  const img = document.createElement("img");
  img.src = `https://flagcdn.com/w40/${v.flag}.png`;
  img.className = "flag" + (i === 0 ? " active" : "");
  img.onclick = () => switchVideo(i);
  flagsContainer.appendChild(img);
});

/* INIT */
video.src = videoList[0].file;

/* 🔥 PLAY FIX */
playBtn.onclick = () => {
  loader.classList.add("active");

  // video hazır olana kadar bekle
  video.addEventListener("canplay", () => {
    video.play()
      .then(() => {
        playBtn.classList.add("hidden");
        loader.classList.remove("active");
        startBackgroundPreload();
      })
      .catch(err => console.error(err));
  }, { once: true });

  video.load(); // önemli
};

/* PRELOAD */
function startBackgroundPreload() {
  let i = 1;

  function preloadNext() {
    if (i >= videoList.length) return;

    const v = document.createElement("video");
    v.src = videoList[i].file;
    v.preload = "auto";

    i++;

    if ("requestIdleCallback" in window) {
      requestIdleCallback(preloadNext);
    } else {
      setTimeout(preloadNext, 500);
    }
  }

  preloadNext();
}

/* SWITCH */
function switchVideo(index) {
  if (index === currentIndex || isSwitching) return;

  isSwitching = true;
  loader.classList.add("active");

  video.style.opacity = 0;

  setTimeout(() => {
    video.src = videoList[index].file;
    video.load();

    video.addEventListener("loadeddata", () => {
      video.play();
      video.style.opacity = 1;
      loader.classList.remove("active");
      isSwitching = false;
    }, { once: true });

  }, 150);

  document.querySelectorAll(".flag").forEach(f => f.classList.remove("active"));
  flagsContainer.children[index].classList.add("active");

  currentIndex = index;
}
</script>

</body>
</html>
