<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Player</title>

<style>
body {
  margin: 0;
  background: #000;
  font-family: sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

/* FLAGS */
.flags {
  position: absolute;
  top: 20px;
  right: 20px;
  display: flex;
  gap: 8px;
  padding: 10px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

.flag {
  width: 34px;
  height: 22px;
  cursor: pointer;
  opacity: 0.6;
  transition: 0.2s;
  border-radius: 4px;
}

.flag:hover {
  opacity: 1;
  transform: scale(1.1);
}

.flag.active {
  opacity: 1;
  outline: 2px solid white;
}

/* VIDEO */
.video-wrapper {
  height: 90vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

video {
  height: 100%;
  width: auto;
  max-width: 100%;
  border-radius: 12px;
  opacity: 1;
  transition: opacity 0.3s ease;
}

video.fade-out {
  opacity: 0;
}

/* 🔥 LOADER */
.loader {
  position: absolute;
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.1);
  border-top: 3px solid white;
  animation: spin 0.8s linear infinite;
  opacity: 0;
  pointer-events: none;
  transition: 0.2s;
}

.loader.active {
  opacity: 1;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* MOBILE */
@media (max-width: 600px) {
  .flags {
    top: auto;
    bottom: 20px;
    right: 50%;
    transform: translateX(50%);
  }
}
</style>
</head>

<body>

<div class="flags">
  <img class="flag active" src="https://flagcdn.com/w40/tr.png" onclick="changeVideo('tur.mp4', this)">
  <img class="flag" src="https://flagcdn.com/w40/us.png" onclick="changeVideo('eng.mp4', this)">
  <img class="flag" src="https://flagcdn.com/w40/fr.png" onclick="changeVideo('fr.mp4', this)">
  <img class="flag" src="https://flagcdn.com/w40/es.png" onclick="changeVideo('spa.mp4', this)">
  <img class="flag" src="https://flagcdn.com/w40/ru.png" onclick="changeVideo('rus.mp4', this)">
  <img class="flag" src="https://flagcdn.com/w40/cn.png" onclick="changeVideo('chi.mp4', this)">
  <img class="flag" src="https://flagcdn.com/w40/de.png" onclick="changeVideo('ger.mp4', this)">
  <img class="flag" src="https://flagcdn.com/w40/jp.png" onclick="changeVideo('jap.mp4', this)">
  <img class="flag" src="https://flagcdn.com/w40/sa.png" onclick="changeVideo('arb.mp4', this)">
</div>

<div class="video-wrapper">
  <video id="videoPlayer" autoplay muted loop playsinline>
    <source src="tur.mp4" type="video/mp4">
  </video>

  <div id="loader" class="loader"></div>
</div>

<script>
let currentVideo = "tur.mp4";
let isSwitching = false;

const video = document.getElementById("videoPlayer");
const loader = document.getElementById("loader");

/* 🔥 İlk giriş autoplay fix (browser politikaları için) */
window.addEventListener("load", () => {
  video.play().catch(() => {});
});

function changeVideo(file, el) {
  if (file === currentVideo || isSwitching) return;

  isSwitching = true;

  // loader aç
  loader.classList.add("active");

  // fade out
  video.classList.add("fade-out");

  setTimeout(() => {
    video.src = file;
    video.load();

    video.onloadeddata = () => {
      video.play();

      video.classList.remove("fade-out");
      loader.classList.remove("active");

      isSwitching = false;
    };
  }, 250);

  document.querySelectorAll(".flag").forEach(f => f.classList.remove("active"));
  el.classList.add("active");

  currentVideo = file;
}
</script>

</body>
</html>
